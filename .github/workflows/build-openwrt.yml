name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target device'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x86_64
          - r2s
          - r4s

permissions:
  contents: write

env:
  IMMORTALWRT_VERSION: "24.10.5"
  TZ: Asia/Shanghai

jobs:
  determine-targets:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      build_date: ${{ steps.date.outputs.date }}
      build_tag: ${{ steps.date.outputs.tag }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix={"target":["x86_64","r2s","r4s"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"target":["${{ github.event.inputs.target }}"]}' >> $GITHUB_OUTPUT
          fi
      - id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "tag=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

  build:
    needs: determine-targets
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-targets.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev zlib1g-dev gawk \
            gettext libssl-dev wget unzip file python3 zstd qemu-utils

      - name: Set target variables
        id: target
        run: |
          case "${{ matrix.target }}" in
            x86_64)
              echo "ib_target=x86-64" >> $GITHUB_OUTPUT
              echo "url_path=targets/x86/64" >> $GITHUB_OUTPUT
              echo "profile=generic" >> $GITHUB_OUTPUT
              ;;
            r2s)
              echo "ib_target=rockchip-armv8" >> $GITHUB_OUTPUT
              echo "url_path=targets/rockchip/armv8" >> $GITHUB_OUTPUT
              echo "profile=friendlyarm_nanopi-r2s" >> $GITHUB_OUTPUT
              ;;
            r4s)
              echo "ib_target=rockchip-armv8" >> $GITHUB_OUTPUT
              echo "url_path=targets/rockchip/armv8" >> $GITHUB_OUTPUT
              echo "profile=friendlyarm_nanopi-r4s" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Extract packages from config
        id: packages
        run: |
          PACKAGES=$(grep '^CONFIG_PACKAGE_' configs/${{ matrix.target }}.config \
            | sed 's/CONFIG_PACKAGE_//;s/=y//' \
            | tr '\n' ' ')
          if echo "$PACKAGES" | grep -q 'dnsmasq-full'; then
            PACKAGES="-dnsmasq $PACKAGES"
          fi
          echo "list=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Packages: $PACKAGES"

      - name: Extract rootfs size from config
        id: rootfs
        run: |
          SIZE=$(grep 'CONFIG_TARGET_ROOTFS_PARTSIZE' configs/${{ matrix.target }}.config \
            | head -1 | cut -d= -f2)
          echo "partsize=${SIZE:-512}" >> $GITHUB_OUTPUT

      - name: Download ImageBuilder
        run: |
          IB_NAME="immortalwrt-imagebuilder-${IMMORTALWRT_VERSION}-${{ steps.target.outputs.ib_target }}.Linux-x86_64"
          IB_URL="https://downloads.immortalwrt.org/releases/${IMMORTALWRT_VERSION}/${{ steps.target.outputs.url_path }}/${IB_NAME}.tar.zst"
          echo "Downloading: $IB_URL"
          wget -q "$IB_URL"
          tar --zstd -xf "${IB_NAME}.tar.zst"
          mv "$IB_NAME" imagebuilder

      - name: Build firmware image
        id: compile
        run: |
          cd imagebuilder
          echo "Building ${{ matrix.target }} with profile ${{ steps.target.outputs.profile }}..."
          make image \
            PROFILE="${{ steps.target.outputs.profile }}" \
            PACKAGES="${{ steps.packages.outputs.list }}" \
            ROOTFS_PARTSIZE="${{ steps.rootfs.outputs.partsize }}" \
            -j$(nproc)
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Organize firmware files
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd imagebuilder/bin/targets
          TARGET_DIR=$(find . -type d -mindepth 2 -maxdepth 2 | head -1)
          cd $TARGET_DIR

          # Create a clean output directory
          mkdir -p $GITHUB_WORKSPACE/firmware/${{ matrix.target }}

          # Copy firmware files
          cp -f *combined*.img.gz $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/ 2>/dev/null || true
          cp -f *sysupgrade*.img.gz $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/ 2>/dev/null || true
          cp -f *factory*.img.gz $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/ 2>/dev/null || true
          cp -f sha256sums $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/ 2>/dev/null || true

          echo "Firmware files:"
          ls -lh $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware artifact
        if: steps.organize.outputs.status == 'success'
        uses: actions/upload-artifact@v5
        with:
          name: openwrt-${{ matrix.target }}-${{ needs.determine-targets.outputs.build_tag }}
          path: firmware/${{ matrix.target }}/
          retention-days: 30

      - name: Upload to Release
        if: steps.organize.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-targets.outputs.build_tag }}
          name: ImmortalWrt ${{ needs.determine-targets.outputs.build_date }}
          body: |
            ## ImmortalWrt 固件 ${{ needs.determine-targets.outputs.build_date }}

            基于 ImmortalWrt `${{ env.IMMORTALWRT_VERSION }}` ImageBuilder 构建

            ### 包含插件
            - OpenClash / Tailscale (CLI) / DDNS / UPnP
            - TTYD / WoL / frpc / Watchcat / SQM / nlbwmon
            - nft-offload 流量分载 / 中文界面 / PPPoE

            ### 需刷机后手动安装
            - MosDNS / Tailscale LuCI GUI / Turboacc

            ### 设备对应文件
            - `*x86*` → J1900
            - `*r4s*` → NanoPi R4S
            - `*r2s*` → NanoPi R2S
          files: firmware/${{ matrix.target }}/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
