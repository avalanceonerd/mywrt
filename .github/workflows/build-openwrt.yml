name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target device'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x86_64
          - r2s
          - r4s

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  determine-targets:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix={"target":["x86_64","r2s","r4s"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"target":["${{ github.event.inputs.target }}"]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: determine-targets
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-targets.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcrunner /usr/local/share/boost
          sudo docker image prune -a -f
          sudo apt-get purge -y azure-cli google-* llvm-* dotnet-* powershell mono-* || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          df -hT

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev file wget \
            libelf-dev device-tree-compiler rename

      - name: Clone OpenWrt source
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth 1 openwrt

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config
        run: |
          cp configs/${{ matrix.target }}.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j$(nproc) || make download -j1 V=s
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          echo "Starting build for ${{ matrix.target }}..."
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Organize files
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets
          # Find the target directory
          TARGET_DIR=$(find . -type d -mindepth 2 -maxdepth 2 | head -1)
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

          cd $TARGET_DIR
          # Remove packages directory to save space
          rm -rf packages
          # List firmware files
          echo "Firmware files:"
          ls -lh

      - name: Upload firmware
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.target }}-${{ github.run_number }}
          path: |
            openwrt/bin/targets/**/*combined*
            openwrt/bin/targets/**/*sysupgrade*
            openwrt/bin/targets/**/*factory*
            openwrt/bin/targets/**/sha256sums
          retention-days: 30

      - name: Upload full bin
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.target }}-full-${{ github.run_number }}
          path: openwrt/bin/targets/
          retention-days: 7
