name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target device'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x86_64
          - r2s
          - r4s

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  determine-targets:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      build_date: ${{ steps.date.outputs.date }}
      build_tag: ${{ steps.date.outputs.tag }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix={"target":["x86_64","r2s","r4s"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"target":["${{ github.event.inputs.target }}"]}' >> $GITHUB_OUTPUT
          fi
      - id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "tag=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

  build:
    needs: determine-targets
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-targets.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcrunner /usr/local/share/boost
          sudo docker image prune -a -f
          sudo apt-get purge -y azure-cli google-* llvm-* dotnet-* powershell mono-* || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          df -hT

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev file wget \
            libelf-dev device-tree-compiler rename

      - name: Clone OpenWrt source
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth 1 openwrt

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config
        run: |
          cp configs/${{ matrix.target }}.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j$(nproc) || make download -j1 V=s
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          echo "Starting build for ${{ matrix.target }}..."
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Organize firmware files
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets
          TARGET_DIR=$(find . -type d -mindepth 2 -maxdepth 2 | head -1)
          cd $TARGET_DIR
          rm -rf packages

          # Create a clean output directory
          mkdir -p $GITHUB_WORKSPACE/firmware/${{ matrix.target }}

          # Copy firmware files (combined images, sysupgrade, sha256sums)
          cp -f *combined*.img.gz $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/ 2>/dev/null || true
          cp -f *sysupgrade*.img.gz $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/ 2>/dev/null || true
          cp -f *factory*.img.gz $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/ 2>/dev/null || true
          cp -f sha256sums $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/ 2>/dev/null || true

          echo "Firmware files:"
          ls -lh $GITHUB_WORKSPACE/firmware/${{ matrix.target }}/
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware artifact
        if: steps.organize.outputs.status == 'success'
        uses: actions/upload-artifact@v5
        with:
          name: openwrt-${{ matrix.target }}-${{ needs.determine-targets.outputs.build_tag }}
          path: firmware/${{ matrix.target }}/
          retention-days: 30

      - name: Upload to Release
        if: steps.organize.outputs.status == 'success'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.determine-targets.outputs.build_tag }}
          name: ImmortalWrt ${{ needs.determine-targets.outputs.build_date }}
          body: |
            ## ImmortalWrt 固件 ${{ needs.determine-targets.outputs.build_date }}

            基于 ImmortalWrt `${{ env.REPO_BRANCH }}` 分支编译

            ### 包含插件
            - OpenClash / MosDNS / Tailscale (GUI)
            - DDNS / UPnP / TTYD / WoL / frpc
            - Turboacc / Watchcat / SQM / nlbwmon
            - 中文界面 / PPPoE / IPv6

            ### 设备对应文件
            - `*x86*` → J1900
            - `*r4s*` → NanoPi R4S
            - `*r2s*` → NanoPi R2S
          files: firmware/${{ matrix.target }}/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
